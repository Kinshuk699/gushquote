services:
  - type: web
    name: gushquote-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false  # set manually in Render dashboard
      - key: GUSHQUOTE_MODEL
        value: deepseek-chat
    plan: free
